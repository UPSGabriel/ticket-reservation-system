services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - ticket_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-service:
    build:
      context: ./inventory-service
    container_name: ticket-inventory
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_pass@postgres:5432/ticket_db
      INSTANCE_NAME: inventory-compose
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ticket_postgres_data:
