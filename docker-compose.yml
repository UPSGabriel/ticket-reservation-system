services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - ticket_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-service:
    build:
      context: ./inventory-service
    container_name: ticket-inventory
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_pass@postgres:5432/ticket_db
      INSTANCE_NAME: inventory-compose
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  reservation-service:
    build:
      context: ./reservation-service
    container_name: ticket-reservation
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_pass@postgres:5432/ticket_db
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      INSTANCE_NAME: reservation-compose
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ticket-gateway
    restart: unless-stopped
    environment:
      RESERVATION_SERVICE_URL: http://reservation-service:8001
      RATE_LIMIT_MAX_REQUESTS: "10"
      RATE_LIMIT_WINDOW_SECONDS: "10"
      MAX_CONCURRENT_REQUESTS: "5"
    ports:
      - "8000:8000"
    depends_on:
      reservation-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticket_postgres_data:
